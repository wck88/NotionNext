name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天零点执行
  workflow_dispatch:

# 核心修改：添加此环境变量，让所有步骤强制运行在 Node.js 24 环境下
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # 第一步：检出代码。
      # 虽然 v4 报警告，但配合上面的 env 变量，它可以在 Node 24 下继续工作。
      - name: Checkout target repo
        uses: actions/checkout@v4

      # 第二步：同步上游仓库。
      # 建议使用 v3.4.1，这是作者针对环境适配进行的稳定版本。
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_sync_repo: tangly1024/NotionNext
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false

      # 第三步：同步失败时的提示。
      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 由于上游仓库的 workflow 文件变更，导致 GitHub 自动暂停了本次自动更新，你需要手动 Sync Fork 一次。"
          exit 1
